name: AgriPredict Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write  # Allows the bot to save the CSVs

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v3

      - name: 2. Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 3. Install Dependencies
        run: |
          pip install earthengine-api pandas numpy scikit-learn imbalanced-learn

      - name: 4. Run Sync Script
        env:
          GEE_KEY: ${{ secrets.GEE_KEY }}
        # The '|| true' ensures we save progress even if GEE times out
        run: python sync_data.py || true

      - name: 5. Save Changes to GitHub
        run: |
          git config --global user.name 'AgriPredict-Bot'
          git config --global user.email 'bot@agripredict.ai'
          
          # This adds ALL yearly CSVs that were created or updated
          git add Maizedata_1200poi_*.csv
          
          # Check if there are actual changes before committing to avoid errors
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Auto-update: Upgraded biological parameters for 1200 points"
            git push origin main
          fi
