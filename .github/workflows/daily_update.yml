name: AgriPredict Daily Sync

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python 3.11
        uses: actions/setup-python@v4
        with:
          python-version: '3.11' # Upgraded

      - name: Install Dependencies
        run: |
          pip install earthengine-api pandas numpy scikit-learn imbalanced-learn

      - name: Run Sync Script
        env:
          GEE_KEY: ${{ secrets.GEE_KEY }}
        run: python sync_data.py

      - name: Save Changes to GitHub
        run: |
          git config --global user.name 'AgriPredict-Bot'
          git config --global user.email 'bot@agripredict.ai'
          git add Master_Data.csv
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update: Satellite data added" && git push)
